name: audit

on:
  merge_group:
  pull_request:

jobs:
  audit:
    name: audit:required
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup PNPM
        uses: dfinity/ci-tools/actions/setup-pnpm@main

      - name: Audit
        run: pnpm audit
